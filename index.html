<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCG U Studio — Learning Design Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- BCG Henderson Sans (drop .woff2 files into ./fonts/ to activate) --- */
@font-face { font-family:'BCG Henderson Sans'; src:url('./fonts/BCGHendersonSans-Thin.woff2') format('woff2');    font-weight:100; font-style:normal; font-display:swap; }
@font-face { font-family:'BCG Henderson Sans'; src:url('./fonts/BCGHendersonSans-Light.woff2') format('woff2');   font-weight:300; font-style:normal; font-display:swap; }
@font-face { font-family:'BCG Henderson Sans'; src:url('./fonts/BCGHendersonSans-Regular.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'BCG Henderson Sans'; src:url('./fonts/BCGHendersonSans-Bold.woff2') format('woff2');    font-weight:700; font-style:normal; font-display:swap; }
/* --- BCG Henderson Serif --- */
@font-face { font-family:'BCG Henderson Serif'; src:url('./fonts/BCGHendersonSerif-Regular.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
/* --- Design tokens (Phase 2 — modernization) ---
   Type scale, spacing, radii, motion + a navy structural primary that lets
   the BCG/BCG U green sit as an accent layer. Every new component should pull
   from these tokens; legacy code keeps working until it's migrated. --- */
:root {
  /* Brand fonts — Trebuchet leads everywhere; BCG U brand swaps to Henderson at runtime. */
  --bcgu-font: 'Trebuchet MS', 'Lucida Sans', 'Inter', system-ui, sans-serif;
  --bcgu-font-bcgu: 'BCG Henderson Sans', 'Trebuchet MS', 'Lucida Sans', 'Inter', system-ui, sans-serif;
  --bcgu-font-serif: 'BCG Henderson Serif', Georgia, serif;
  --bcgu-font-mono: 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
  /* Type scale */
  --t-xs:  12px;
  --t-sm:  14px;
  --t-md:  16px;
  --t-lg:  20px;
  --t-xl:  28px;
  --t-2xl: 40px;
  --t-3xl: 56px;
  /* Line heights */
  --lh-tight:   1.2;
  --lh-snug:    1.35;
  --lh-normal:  1.55;
  --lh-relaxed: 1.7;
  /* Spacing scale */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  /* Radii */
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --r-pill: 999px;
  /* Motion */
  --ease:        cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --m-fast:  120ms;
  --m-med:   220ms;
  --m-slow:  380ms;
  /* Navy primary (new structural color — green stays as accent) */
  --c-navy:      #0E1E3F;
  --c-navy-700:  #18305E;
  --c-navy-500:  #2A4A8A;
  --c-navy-300:  #6B82B5;
  --c-navy-100:  #E6EAF3;
  /* Neutral scale */
  --c-ink:       #0B0F1A;
  --c-ink-2:     #1F2436;
  --c-ink-3:     #4A4F62;
  --c-ink-4:     #767C90;
  --c-ink-5:     #A6ABBC;
  --c-line:      #E5E7EE;
  --c-line-2:    #EEF0F4;
  --c-bg:        #F7F8FA;
  --c-bg-2:      #FFFFFF;
  /* Elevation (shadows) */
  --shadow-sm:  0 1px 2px rgba(14, 30, 63, 0.06);
  --shadow-md:  0 6px 18px rgba(14, 30, 63, 0.08);
  --shadow-lg:  0 18px 42px rgba(14, 30, 63, 0.10);
  --shadow-xl:  0 28px 70px rgba(14, 30, 63, 0.18);
  /* Sidebar / tokens consumed by JS via applyBrandVars() */
  --sb-active-bg: #E6F7EF;
  --sb-active-fg: #1B7A4F;
  --sb-active-pri: #29BA74;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--bcgu-font);background:#F7F8FA;color:#1a1a2e;}
button,input,textarea{font-family:inherit;}
button{cursor:pointer;transition:all 0.2s;}
input,textarea{transition:border-color 0.2s;}
input:focus,textarea:focus{outline:none;border-color:#29BA74!important;}
.btn-back:hover{color:#29BA74!important;}
.btn-pri:hover{filter:brightness(0.92);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.18)!important;}
.btn-sec:hover{background:#E6F7EF!important;border-color:#29BA74!important;}
.btn-add:hover{background:#29BA74!important;color:#fff!important;}
.btn-del:hover{color:#ef4444!important;}
.btn-copy:hover{border-color:#29BA74!important;color:#29BA74!important;}
.comp-card:hover{border-color:#29BA74!important;box-shadow:0 4px 20px rgba(41,186,116,0.15)!important;transform:translateY(-2px);}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,0.12)!important;}
.filter-tab{padding:6px 16px;border-radius:20px;border:1.5px solid #E8E8E8;background:#fff;font-size:11px;font-weight:600;color:#888;cursor:pointer;transition:all 0.2s;}
.filter-tab:hover{border-color:#29BA74;color:#29BA74;}
.filter-tab.active{background:#29BA74;border-color:#29BA74;color:#fff;}
/* --- Studio landing: animated hero + interactive tiles --- */
@keyframes studioGradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes studioFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes studioFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes studioToastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
/* Phase 2: mesh-blob hero animations */
@keyframes meshBlobA{0%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(60px,-40px,0) scale(1.12);}100%{transform:translate3d(0,0,0) scale(1);}}
@keyframes meshBlobB{0%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(-50px,30px,0) scale(0.9);}100%{transform:translate3d(0,0,0) scale(1);}}
@keyframes meshBlobC{0%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(-30px,-50px,0) scale(1.08);}100%{transform:translate3d(0,0,0) scale(1);}}
@keyframes routeFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.studio-hero-bg{background-size:220% 220%;animation:studioGradientShift 22s ease-in-out infinite;}
/* Mesh hero — solid navy base + 3 floating colored blobs blurred + screen-blended */
.hero-mesh{position:relative;overflow:hidden;background:var(--c-accent-dk,#0D3B2C);isolation:isolate;}
.hero-mesh::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.10) 0%, transparent 55%);pointer-events:none;z-index:1;}
.hero-mesh::after{content:"";position:absolute;left:0;right:0;bottom:0;height:120px;background:linear-gradient(to bottom, transparent, rgba(0,20,12,0.22));pointer-events:none;z-index:1;}
.hero-blob{position:absolute;border-radius:50%;filter:blur(72px);mix-blend-mode:screen;opacity:0.66;pointer-events:none;will-change:transform;}
.hero-blob.a{width:560px;height:560px;left:-140px;top:-180px;background:radial-gradient(circle, var(--c-accent,#29BA74) 0%, transparent 70%);animation:meshBlobA 22s var(--ease,ease-in-out) infinite;}
.hero-blob.b{width:480px;height:480px;right:-120px;top:40px;background:radial-gradient(circle, #4FD295 0%, transparent 65%);animation:meshBlobB 26s var(--ease,ease-in-out) infinite;}
.hero-blob.c{width:420px;height:420px;left:32%;bottom:-180px;background:radial-gradient(circle, var(--c-accent-dk,#1B7A4F) 0%, transparent 70%);animation:meshBlobC 19s var(--ease,ease-in-out) infinite;}
.hero-blob.d{width:300px;height:300px;right:18%;bottom:-100px;background:radial-gradient(circle, rgba(42,74,138,0.55) 0%, transparent 70%);animation:meshBlobC 24s var(--ease,ease-in-out) infinite;opacity:0.42;}
.studio-prompt{box-shadow:0 24px 70px rgba(0,0,0,0.22),0 0 0 1px rgba(255,255,255,0.1) inset;transition:box-shadow var(--m-med,250ms) var(--ease,ease),transform var(--m-fast,200ms) var(--ease,ease);}
.studio-prompt:focus-within{box-shadow:0 32px 90px rgba(0,0,0,0.32),0 0 0 2px rgba(255,255,255,0.45) inset;transform:translateY(-2px);}
.studio-chip{transition:all var(--m-fast,200ms) var(--ease,ease);cursor:pointer;}
.studio-chip:hover{background:rgba(255,255,255,0.28)!important;transform:translateY(-1px);border-color:rgba(255,255,255,0.5)!important;}
.studio-chip:active{transform:translateY(0) scale(0.97);}
/* Phase 2 Day 3: Hero lanes — three concrete entry points (Drop deck / Brief in chat / Browse parts) */
.hero-lanes{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:14px;margin-bottom:28px;}
@media (max-width: 920px){.hero-lanes{grid-template-columns:1fr;}}
.hero-lane{position:relative;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:18px;padding:22px 22px 20px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);cursor:pointer;display:flex;flex-direction:column;min-height:228px;transition:transform var(--m-med,250ms) var(--ease-out,cubic-bezier(0.16,1,0.3,1)),background var(--m-fast,150ms),border-color var(--m-fast,150ms);}
.hero-lane:hover{transform:translateY(-3px);background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.30);}
.hero-lane:active{transform:translateY(-1px);}
.hero-lane-primary{background:rgba(255,255,255,0.97);border-color:rgba(255,255,255,0.97);cursor:default;box-shadow:0 18px 48px rgba(0,40,24,0.32);}
.hero-lane-primary:hover{transform:none;background:rgba(255,255,255,0.99);border-color:rgba(255,255,255,1);}
.hero-lane-eyebrow{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.55);margin-bottom:14px;}
.hero-lane-primary .hero-lane-eyebrow{color:var(--c-accent-dk,#1B7A4F);}
.hero-lane-icon{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:14px;transition:transform var(--m-med,250ms) var(--ease-spring,cubic-bezier(0.34,1.56,0.64,1));}
.hero-lane:hover .hero-lane-icon{transform:scale(1.08) rotate(-3deg);}
.hero-lane-icon-primary{background:linear-gradient(135deg, var(--c-accent,#29BA74) 0%, var(--c-accent-dk,#1B7A4F) 100%);border-color:transparent;box-shadow:0 8px 22px -8px rgba(13,59,44,0.55);}
.hero-lane-title{font-size:18px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px;letter-spacing:-0.3px;}
.hero-lane-primary .hero-lane-title{color:var(--c-ink,#0B0F1A);}
.hero-lane-sub{font-size:12.5px;color:rgba(255,255,255,0.74);line-height:1.5;margin-bottom:auto;padding-bottom:14px;}
.hero-lane-primary .hero-lane-sub{color:var(--c-ink-3,#4A4F62);}
.hero-lane-cta{font-size:12.5px;font-weight:700;color:#fff;display:inline-flex;align-items:center;gap:6px;margin-top:10px;}
.hero-lane-cta .ar{display:inline-block;transition:transform var(--m-fast,200ms);}
.hero-lane:hover .hero-lane-cta .ar{transform:translateX(4px);}
.hero-lane-input{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--c-line,#E5E7EE);border-radius:12px;padding:5px 5px 5px 12px;margin-top:auto;transition:border-color var(--m-fast,150ms),box-shadow var(--m-fast,150ms);}
.hero-lane-input:focus-within{border-color:var(--c-accent,#29BA74);box-shadow:0 0 0 3px rgba(41,186,116,0.18);}
.hero-lane-input-icon{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;color:var(--c-accent,#29BA74);flex-shrink:0;}
.hero-lane-input input{flex:1;border:none;background:transparent;font-size:13px;color:var(--c-ink,#0B0F1A);padding:9px 0;outline:none;font-family:inherit;min-width:0;}
.hero-lane-input button{background:linear-gradient(135deg, var(--c-accent,#29BA74) 0%, var(--c-accent-dk,#1B7A4F) 100%);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;flex-shrink:0;transition:transform var(--m-fast,150ms),box-shadow var(--m-fast,150ms);box-shadow:0 4px 12px -4px rgba(13,59,44,0.45);}
.hero-lane-input button:hover{transform:translateY(-1px);box-shadow:0 8px 18px -6px rgba(13,59,44,0.55);}
/* Quick-launch tiles — Phase 2 redesign */
.quick-tile{transition:transform var(--m-med,250ms) var(--ease-out,cubic-bezier(0.16,1,0.3,1)),box-shadow var(--m-med,250ms),border-color var(--m-fast,200ms);cursor:pointer;position:relative;}
.quick-tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg,0 18px 42px rgba(14,30,63,0.10))!important;border-color:var(--c-navy-300,#6B82B5)!important;}
.quick-tile:active{transform:translateY(-1px) scale(0.99);}
.quick-tile .qt-arrow{display:inline-block;transition:transform var(--m-fast,200ms) var(--ease,ease);}
.quick-tile:hover .qt-arrow{transform:translateX(5px);}
.quick-tile .qt-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:16px;box-shadow:0 8px 20px -8px rgba(14,30,63,0.42);transition:transform var(--m-med,250ms) var(--ease-spring,cubic-bezier(0.34,1.56,0.64,1));}
.quick-tile:hover .qt-icon{transform:scale(1.06) rotate(-3deg);}
.quick-tile-sm .qt-icon-sm{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--c-navy-100,#E6EAF3);color:var(--c-navy,#0E1E3F);transition:transform var(--m-fast,200ms) var(--ease,ease);}
.quick-tile-sm:hover .qt-icon-sm{transform:scale(1.06);background:var(--c-navy,#0E1E3F);color:#fff;}
/* Phase 2: route transition (fade-up on every mode change) */
.app-main.route-fade-in{animation:routeFadeIn var(--m-med,220ms) var(--ease-out,cubic-bezier(0.16,1,0.3,1)) both;}
/* Phase 2: refined focus rings (keyboard accessibility, navy-toned) */
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,a:focus-visible{outline:2px solid var(--c-navy,#0E1E3F);outline-offset:2px;border-radius:6px;}
/* Phase 2: micro-interaction — :active press */
button:not(:disabled):active{transform:translateY(0.5px);}
/* Phase 2: reduce motion respects user pref */
@media (prefers-reduced-motion: reduce){
  .hero-blob,.studio-hero-bg{animation:none!important;}
  .app-main.route-fade-in{animation:none!important;}
  .quick-tile,.quick-tile:hover,.quick-tile .qt-icon,.quick-tile:hover .qt-icon{transition:none!important;transform:none!important;}
  .hero-lane,.hero-lane:hover,.hero-lane .hero-lane-icon,.hero-lane:hover .hero-lane-icon{transition:none!important;transform:none!important;}
}
.featured-rail{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;}
.featured-rail::-webkit-scrollbar{display:none;}
.featured-card{transition:transform 0.25s,box-shadow 0.25s;cursor:pointer;flex:0 0 auto;}
.featured-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.1)!important;}
.rail-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid #E8E8E8;background:#fff;color:#888;font-size:16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.rail-btn:hover{background:#f5f5f5;color:#333;}
.studio-fade{animation:studioFadeUp 0.55s ease-out both;}
.studio-fade.d1{animation-delay:0.08s;}
.studio-fade.d2{animation-delay:0.16s;}
.studio-fade.d3{animation-delay:0.24s;}
.studio-fade.d4{animation-delay:0.32s;}
#studioToast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 12px 44px rgba(0,0,0,0.32);z-index:9999;animation:studioToastIn 0.28s ease-out;max-width:420px;text-align:center;}
/* --- App shell + sidebar IA --- */
.app-shell{display:flex;min-height:100vh;}
.app-main{flex:1;min-width:0;}
.sidebar{width:240px;position:sticky;top:0;align-self:flex-start;height:100vh;background:#fff;border-right:1px solid #E8E8E8;padding:18px 12px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;box-shadow:1px 0 3px rgba(0,0,0,0.02);}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid #F0F0F0;margin-bottom:10px;}
.sidebar-brand-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;font-weight:700;letter-spacing:-0.5px;}
.sb-section{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.6px;color:#aaa;padding:14px 12px 6px;}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:background 0.15s,color 0.15s;text-decoration:none;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.sb-item:hover{background:#F7F8FA;color:#1a1a2e;}
.sb-item.active{background:var(--sb-active-bg,#E6F7EF);color:var(--sb-active-fg,#1B7A4F);font-weight:700;}
.sb-item .sb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;line-height:1;}
.sb-item .sb-count{margin-left:auto;font-size:10px;color:#aaa;font-weight:600;}
.sb-item.active .sb-count{color:var(--sb-active-fg,#1B7A4F);}
.sb-badge{margin-left:auto;font-size:8.5px;padding:2px 6px;background:#F59E0B;color:#000;border-radius:6px;font-weight:800;letter-spacing:0.5px;line-height:1;}
.sb-footer{margin-top:auto;padding-top:14px;border-top:1px solid #F0F0F0;}
.sb-brand-picker{display:flex;gap:4px;padding:8px 4px 12px;}
.sb-brand-dot{flex:1;padding:7px 0;border-radius:7px;border:1.5px solid #E8E8E8;background:#fff;font-size:10px;font-weight:700;color:#888;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.sb-brand-dot:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#29BA74);}
.sb-brand-dot.active{background:var(--sb-active-bg,#E6F7EF);border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#1B7A4F);}
.sb-cta{display:block;padding:10px 12px;background:linear-gradient(135deg,#1a1a2e,#0D3B2C);border-radius:10px;color:#fff;font-size:11.5px;font-weight:600;text-decoration:none;text-align:center;margin-bottom:10px;transition:opacity 0.15s;}
.sb-cta:hover{opacity:0.9;}
.sb-feedback{font-size:10px;color:#888;padding:0 12px 4px;line-height:1.5;text-align:center;}
.sb-feedback a{color:var(--sb-active-fg,#29BA74);font-weight:600;text-decoration:none;}
.sb-settings{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;color:#555;cursor:pointer;background:none;border:1.5px solid #EEF0F4;text-align:left;font-family:inherit;margin-bottom:10px;transition:background var(--m-fast,150ms),color var(--m-fast,150ms),border-color var(--m-fast,150ms);}
.sb-settings:hover{background:#F7F8FA;color:#1a1a2e;border-color:var(--c-line,#E5E7EE);}
.sb-settings .sb-settings-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--c-navy-100,#E6EAF3);color:var(--c-navy,#0E1E3F);font-weight:700;}
.sb-settings .sb-settings-meta{font-size:9.5px;color:#a6abbc;margin-left:auto;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
/* --- Settings drawer (slides from right) --- */
@keyframes settingsDrawerIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes settingsScrim{from{opacity:0;}to{opacity:1;}}
.sd-scrim{position:fixed;inset:0;background:rgba(11,15,26,0.42);backdrop-filter:blur(3px);z-index:9997;animation:settingsScrim var(--m-med,220ms) var(--ease,ease);}
.sd-drawer{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:#fff;box-shadow:var(--shadow-xl,-32px 0 80px rgba(14,30,63,0.18));z-index:9998;display:flex;flex-direction:column;animation:settingsDrawerIn var(--m-med,220ms) var(--ease-out,cubic-bezier(0.16,1,0.3,1));}
.sd-head{display:flex;align-items:center;justify-content:space-between;padding:22px 26px 16px;border-bottom:1px solid var(--c-line-2,#EEF0F4);}
.sd-head-title{font-size:var(--t-lg,20px);font-weight:800;letter-spacing:-0.3px;color:var(--c-ink,#0B0F1A);}
.sd-head-sub{font-size:var(--t-xs,12px);color:var(--c-ink-4,#767C90);margin-top:2px;}
.sd-close{background:none;border:none;width:34px;height:34px;border-radius:10px;color:var(--c-ink-4,#767C90);font-size:20px;cursor:pointer;transition:background var(--m-fast,120ms),color var(--m-fast,120ms);}
.sd-close:hover{background:#F7F8FA;color:var(--c-ink,#0B0F1A);}
.sd-body{flex:1;overflow-y:auto;padding:18px 26px 32px;}
.sd-section{margin-bottom:26px;}
.sd-section-title{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.6px;color:var(--c-ink-4,#767C90);margin-bottom:10px;}
.sd-brands{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sd-brand{padding:14px 10px;border:1.5px solid var(--c-line,#E5E7EE);border-radius:var(--r-md,10px);background:#fff;cursor:pointer;text-align:center;transition:all var(--m-fast,150ms) var(--ease,ease);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:8px;}
.sd-brand:hover{border-color:var(--c-navy,#0E1E3F);transform:translateY(-1px);box-shadow:var(--shadow-sm,0 1px 2px rgba(14,30,63,0.06));}
.sd-brand.active{border-color:var(--c-navy,#0E1E3F);background:var(--c-navy-100,#E6EAF3);}
.sd-brand-swatch{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:-0.5px;}
.sd-brand-name{font-size:12px;font-weight:700;color:var(--c-ink-2,#1F2436);}
.sd-brand-meta{font-size:9.5px;color:var(--c-ink-4,#767C90);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.sd-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--c-line-2,#EEF0F4);gap:14px;}
.sd-row:last-child{border-bottom:none;}
.sd-row-label{font-size:13px;font-weight:600;color:var(--c-ink-2,#1F2436);}
.sd-row-sub{font-size:11px;color:var(--c-ink-4,#767C90);margin-top:2px;line-height:1.5;}
.sd-row-action{padding:7px 13px;border:1.5px solid var(--c-line,#E5E7EE);background:#fff;border-radius:var(--r-md,10px);font-size:11.5px;font-weight:700;color:var(--c-ink-2,#1F2436);cursor:pointer;font-family:inherit;transition:all var(--m-fast,120ms) var(--ease,ease);white-space:nowrap;}
.sd-row-action:hover{border-color:var(--c-navy,#0E1E3F);color:var(--c-navy,#0E1E3F);}
/* Phase 2 Day 3C: Help drawer + welcome modal */
.hd-lanes{display:flex;flex-direction:column;gap:10px;}
.hd-lane{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#F7F8FA;border:1px solid var(--c-line-2,#EEF0F4);border-radius:var(--r-md,10px);}
.hd-lane-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;letter-spacing:-0.3px;}
.hd-lane-title{font-size:13px;font-weight:700;color:var(--c-ink,#0B0F1A);margin-bottom:3px;}
.hd-lane-sub{font-size:11.5px;color:var(--c-ink-3,#4A4F62);line-height:1.5;}
.hd-compare{display:grid;grid-template-columns:1fr;gap:10px;}
.hd-compare-card{padding:14px;background:#fff;border:1.5px solid var(--c-line,#E5E7EE);border-radius:var(--r-md,10px);}
.hd-compare-tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}
.hd-compare-title{font-size:13px;font-weight:700;color:var(--c-ink,#0B0F1A);margin-bottom:8px;}
.hd-compare-list{font-size:11.5px;color:var(--c-ink-3,#4A4F62);line-height:1.7;margin-bottom:8px;}
.hd-compare-list code{font-family:var(--bcgu-font-mono,monospace);font-size:10.5px;background:#F1F3F8;padding:1px 5px;border-radius:4px;color:var(--c-accent-dk,#1B7A4F);}
.hd-compare-when{font-size:11px;color:var(--c-ink-2,#1F2436);font-weight:600;line-height:1.5;background:var(--c-accent-lt,#E6F7EF);padding:8px 10px;border-radius:8px;border-left:3px solid var(--c-accent,#29BA74);}
.hd-kbd{display:inline-flex;align-items:center;justify-content:center;padding:4px 9px;background:#F7F8FA;border:1px solid var(--c-line,#E5E7EE);border-bottom-width:2px;border-radius:6px;font-family:var(--bcgu-font-mono,monospace);font-size:11px;font-weight:700;color:var(--c-ink-2,#1F2436);white-space:nowrap;}
/* Welcome modal — first-run, 3 slides */
@keyframes welcomeScrim{from{opacity:0;}to{opacity:1;}}
@keyframes welcomeModalIn{from{opacity:0;transform:translate(-50%, calc(-50% + 18px)) scale(0.97);}to{opacity:1;transform:translate(-50%, -50%) scale(1);}}
.welcome-scrim{position:fixed;inset:0;background:rgba(11,15,26,0.55);backdrop-filter:blur(6px);z-index:9996;animation:welcomeScrim var(--m-med,220ms) var(--ease,ease);}
.welcome-modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;max-width:92vw;max-height:88vh;overflow:auto;background:#fff;border-radius:22px;box-shadow:0 32px 80px rgba(0,40,24,0.32),0 0 0 1px rgba(0,0,0,0.04);z-index:9997;padding:36px 38px 26px;animation:welcomeModalIn var(--m-med,260ms) var(--ease-spring,cubic-bezier(0.34,1.56,0.64,1));}
.wm-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:9px;border:none;background:transparent;color:var(--c-ink-4,#767C90);font-size:20px;cursor:pointer;transition:background var(--m-fast,120ms);}
.wm-close:hover{background:#F7F8FA;color:var(--c-ink,#0B0F1A);}
.wm-art{margin-bottom:20px;display:flex;}
.wm-eyebrow{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--c-accent-dk,#1B7A4F);margin-bottom:8px;}
.wm-title{font-size:24px;font-weight:700;color:var(--c-ink,#0B0F1A);line-height:1.2;letter-spacing:-0.5px;margin-bottom:14px;}
.wm-body{font-size:13.5px;color:var(--c-ink-3,#4A4F62);line-height:1.65;margin-bottom:24px;}
.wm-lanes{display:flex;flex-direction:column;gap:10px;}
.wm-lane{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#F7F8FA;border-radius:10px;}
.wm-lane-num{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg, var(--c-accent,#29BA74), var(--c-accent-dk,#1B7A4F));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.wm-lane-t{font-size:13px;font-weight:700;color:var(--c-ink,#0B0F1A);}
.wm-lane-s{font-size:11.5px;color:var(--c-ink-3,#4A4F62);margin-top:1px;}
.wm-shortcuts{display:flex;flex-direction:column;gap:12px;}
.wm-shortcut{display:flex;align-items:center;gap:11px;padding:11px 14px;background:#F7F8FA;border-radius:10px;font-size:12.5px;color:var(--c-ink-2,#1F2436);line-height:1.5;}
.wm-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.wm-dots{display:flex;gap:6px;}
.wm-dot{width:6px;height:6px;border-radius:50%;background:var(--c-line,#E5E7EE);transition:width var(--m-fast,150ms),background var(--m-fast,150ms);}
.wm-dot.active{width:18px;background:var(--c-accent,#29BA74);border-radius:3px;}
.wm-nav{display:flex;gap:8px;}
.wm-skip,.wm-back{padding:9px 14px;background:transparent;border:none;color:var(--c-ink-4,#767C90);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;border-radius:8px;transition:background var(--m-fast,120ms);}
.wm-skip:hover,.wm-back:hover{background:#F7F8FA;color:var(--c-ink,#0B0F1A);}
.wm-next{padding:9px 18px;background:linear-gradient(135deg, var(--c-accent,#29BA74), var(--c-accent-dk,#1B7A4F));color:#fff;border:none;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px -4px rgba(13,59,44,0.45);transition:transform var(--m-fast,120ms),box-shadow var(--m-fast,120ms);}
.wm-next:hover{transform:translateY(-1px);box-shadow:0 8px 18px -6px rgba(13,59,44,0.55);}
@media (prefers-reduced-motion: reduce){
  .welcome-modal,.welcome-scrim,.sd-drawer,.sd-scrim{animation:none!important;}
}
/* --- Library refresh: hero + category sections + richer cards --- */
.lib-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid #EEE;flex-wrap:wrap;}
.lib-hero-left{flex:1;min-width:260px;}
.lib-hero-kicker{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:12px;}
.lib-hero-kicker-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.lib-hero-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;line-height:1.2;}
.lib-hero-sub{font-size:13px;line-height:1.55;max-width:540px;}
.lib-hero-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.lib-hero-stat{display:flex;flex-direction:column;align-items:flex-end;padding:6px 14px;border-radius:10px;background:#F7F8FA;border:1px solid #EEE;}
.lib-hero-stat-n{font-size:20px;font-weight:800;line-height:1;letter-spacing:-0.5px;}
.lib-hero-stat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;color:#aaa;margin-top:3px;}
.lib-search{position:relative;margin-bottom:16px;}
.lib-search-input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid #E8E8E8;border-radius:12px;font-size:13px;background:#fff;font-family:inherit;}
.lib-search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;color:#bbb;pointer-events:none;}
.lib-search-kbd{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:10px;color:#888;border:1px solid #E8E8E8;padding:3px 7px;border-radius:4px;font-family:'SFMono-Regular',Menlo,monospace;background:#FAFAFA;transition:background 0.15s,color 0.15s;}
button.lib-search-kbd{cursor:pointer;font-weight:600;}
button.lib-search-kbd:hover{background:var(--sb-active-bg,#E6F7EF);color:var(--sb-active-fg,#1B7A4F);border-color:var(--sb-active-fg,#1B7A4F);}
.lib-section{margin-bottom:26px;}
.lib-section-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:0 2px;}
.lib-section-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.lib-section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;}
.lib-section-count{font-size:10px;font-weight:700;color:#aaa;padding:2px 8px;background:#F2F3F5;border-radius:10px;}
.lib-section-line{flex:1;height:1px;background:#EEE;}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.lib-card{position:relative;padding:0;border-radius:14px;border:1.5px solid #E8E8E8;background:#fff;cursor:pointer;text-align:left;overflow:hidden;transition:all 0.2s;display:flex;flex-direction:column;font-family:inherit;}
.lib-card:hover{border-color:var(--sb-active-fg,#29BA74);box-shadow:0 8px 28px rgba(0,0,0,0.08);transform:translateY(-2px);}
.lib-card-thumb{height:82px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FAFBFC,#F2F4F7);border-bottom:1px solid #F0F0F0;flex-shrink:0;overflow:hidden;position:relative;}
.lib-card-thumb svg{width:128px!important;height:76px!important;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.04));}
.lib-card-body{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column;}
.lib-card-name{font-size:13.5px;font-weight:700;color:#222;margin-bottom:4px;letter-spacing:-0.2px;}
.lib-card-desc{font-size:11.5px;color:#777;line-height:1.5;flex:1;}
.lib-card-when{font-size:10.5px;color:var(--c-accent-dk,#1B7A4F);line-height:1.5;margin-top:8px;padding:7px 9px;background:var(--c-accent-lt,#E6F7EF);border-radius:6px;border-left:2.5px solid var(--c-accent,#29BA74);font-weight:500;}
.lib-card-when strong{font-weight:800;text-transform:uppercase;font-size:9px;letter-spacing:1.2px;margin-right:4px;color:var(--c-accent-dk,#1B7A4F);}
.lib-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px dashed #F0F0F0;}
.lib-card-chip{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:3px 8px;border-radius:6px;}
.lib-card-arrow{font-size:13px;color:#bbb;transition:transform 0.2s,color 0.2s;}
.lib-card:hover .lib-card-arrow{transform:translateX(3px);color:var(--sb-active-fg,#29BA74);}
.lib-empty{grid-column:1/-1;padding:48px 24px;text-align:center;background:#FAFBFC;border-radius:14px;border:1.5px dashed #E8E8E8;}
.lib-empty-icon{font-size:32px;opacity:0.5;margin-bottom:10px;}
.lib-empty-title{font-size:14px;font-weight:700;color:#555;margin-bottom:5px;}
.lib-empty-sub{font-size:12px;color:#999;line-height:1.5;}
.lib-empty-btn{margin-top:14px;padding:8px 18px;border-radius:8px;border:1.5px solid var(--sb-active-fg,#29BA74);background:#fff;color:var(--sb-active-fg,#29BA74);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.filter-tab .filter-count{opacity:0.6;margin-left:6px;font-weight:500;font-size:10px;}
.filter-tab.active .filter-count{opacity:0.85;}
/* --- Components landing left-rail layout (Phase 2) --- */
.lib-layout{display:grid;grid-template-columns:248px 1fr;gap:28px;align-items:flex-start;}
@media (max-width:880px){.lib-layout{grid-template-columns:1fr;}.lib-rail{position:static!important;}}
.lib-rail{position:sticky;top:18px;background:#fff;border:1px solid var(--c-line,#E5E7EE);border-radius:var(--r-lg,14px);padding:6px 4px 12px;box-shadow:var(--shadow-sm,0 1px 2px rgba(14,30,63,0.06));max-height:calc(100vh - 36px);overflow-y:auto;}
.lib-rail-section{padding:10px 14px 4px;}
.lib-rail-title{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.6px;color:var(--c-ink-4,#767C90);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.lib-rail-title-ic{width:18px;height:18px;border-radius:5px;background:var(--c-navy-100,#E6EAF3);color:var(--c-navy,#0E1E3F);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;}
.lib-rail-list{display:flex;flex-direction:column;gap:2px;}
.lib-rail-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;border:none;background:none;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--c-ink-3,#4A4F62);cursor:pointer;text-align:left;font-family:inherit;transition:background var(--m-fast,120ms),color var(--m-fast,120ms);}
.lib-rail-btn:hover{background:#F7F8FA;color:var(--c-ink,#0B0F1A);}
.lib-rail-btn.active{background:var(--c-navy-100,#E6EAF3);color:var(--c-navy,#0E1E3F);font-weight:700;}
.lib-rail-btn .lr-ic{width:18px;font-size:13px;text-align:center;flex-shrink:0;}
.lib-rail-btn .lr-cnt{margin-left:auto;font-size:10px;color:var(--c-ink-5,#A6ABBC);font-weight:600;}
.lib-rail-btn.active .lr-cnt{color:var(--c-navy,#0E1E3F);}
.lib-rail-format{display:flex;gap:4px;padding:4px;background:#F7F8FA;border-radius:10px;border:1px solid var(--c-line-2,#EEF0F4);}
.lib-rail-format button{flex:1;padding:7px 0;border:none;background:none;border-radius:7px;font-size:11px;font-weight:700;color:var(--c-ink-4,#767C90);cursor:pointer;font-family:inherit;transition:background var(--m-fast,120ms),color var(--m-fast,120ms);}
.lib-rail-format button:hover{color:var(--c-ink,#0B0F1A);}
.lib-rail-format button.active{background:#fff;color:var(--c-navy,#0E1E3F);box-shadow:var(--shadow-sm,0 1px 2px rgba(14,30,63,0.06));}
.lib-rail-divider{height:1px;background:var(--c-line-2,#EEF0F4);margin:8px 14px;}
.lib-rail-reset{width:calc(100% - 28px);margin:6px 14px 0;padding:7px;border:1px dashed var(--c-line,#E5E7EE);background:#fff;border-radius:8px;font-size:10.5px;font-weight:700;color:var(--c-ink-4,#767C90);cursor:pointer;font-family:inherit;transition:all var(--m-fast,120ms);}
.lib-rail-reset:hover{border-color:var(--c-navy,#0E1E3F);color:var(--c-navy,#0E1E3F);}
.lib-active-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;}
.lib-active-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;background:var(--c-navy-100,#E6EAF3);color:var(--c-navy,#0E1E3F);border-radius:var(--r-pill,999px);font-size:11px;font-weight:700;border:1px solid transparent;}
.lib-active-pill button{background:none;border:none;color:var(--c-navy,#0E1E3F);cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px;font-family:inherit;}
.lib-active-pill button:hover{color:#000;}
/* --- Command palette (unified search) --- */
@keyframes palFadeIn{from{opacity:0}to{opacity:1}}
@keyframes palSlideIn{from{opacity:0;transform:translateY(-14px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.pal-backdrop{position:fixed;inset:0;background:rgba(20,25,40,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:flex-start;justify-content:center;padding:90px 20px 20px;animation:palFadeIn 0.16s ease-out;}
.pal-dialog{width:100%;max-width:640px;background:#fff;border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,0.4),0 0 0 1px rgba(0,0,0,0.04);overflow:hidden;animation:palSlideIn 0.2s cubic-bezier(0.34,1.25,0.64,1);display:flex;flex-direction:column;max-height:calc(100vh - 140px);}
.pal-input-row{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #EEE;flex-shrink:0;}
.pal-input-icon{font-size:18px;color:#bbb;flex-shrink:0;}
.pal-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:#1a1a2e;background:transparent;padding:4px 0;}
.pal-input::placeholder{color:#bbb;}
.pal-esc{font-size:10px;color:#aaa;border:1px solid #E8E8E8;padding:3px 8px;border-radius:5px;font-family:'SFMono-Regular',Menlo,monospace;background:#FAFAFA;flex-shrink:0;}
.pal-results{overflow-y:auto;padding:8px 8px 10px;flex:1;}
.pal-group-head{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:#aaa;padding:12px 14px 6px;}
.pal-item{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:background 0.12s;}
.pal-item.active{background:var(--sb-active-bg,#E6F7EF);}
.pal-item-thumb{width:42px;height:30px;border-radius:6px;overflow:hidden;border:1px solid #F0F0F0;flex-shrink:0;background:#FAFBFC;display:flex;align-items:center;justify-content:center;}
.pal-item-thumb svg{width:42px!important;height:28px!important;}
.pal-item-body{flex:1;min-width:0;}
.pal-item-name{font-size:13px;font-weight:600;color:#222;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pal-item-desc{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pal-item-meta{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.pal-item-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:0.5px;}
.pal-item-type.html{background:#E6F7EF;color:#1B7A4F;}
.pal-item-type.scorm{background:#EDE9FE;color:#6B21A8;}
.pal-item-enter{font-size:10px;color:#aaa;opacity:0;transition:opacity 0.15s;}
.pal-item.active .pal-item-enter{opacity:1;color:var(--sb-active-fg,#1B7A4F);}
.pal-hit{background:rgba(245,220,40,0.45);border-radius:3px;padding:0 1px;font-weight:700;color:inherit;}
.pal-empty{padding:40px 20px;text-align:center;color:#999;font-size:13px;}
.pal-empty-icon{font-size:28px;opacity:0.4;margin-bottom:8px;}
.pal-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-top:1px solid #F0F0F0;font-size:10px;color:#aaa;flex-shrink:0;background:#FAFBFC;}
.pal-foot kbd{font-family:'SFMono-Regular',Menlo,monospace;font-size:9.5px;border:1px solid #E4E4E4;padding:1.5px 6px;border-radius:4px;background:#fff;color:#666;margin:0 3px;}
/* --- Journey builder v0 --- */
.jb-wrap{display:grid;grid-template-columns:1fr 320px;gap:0;min-height:calc(100vh - 0px);}
@media(max-width:1100px){.jb-wrap{grid-template-columns:1fr;}}
.jb-main{padding:22px 30px 60px;max-width:820px;margin:0 auto;width:100%;box-sizing:border-box;}
.jb-hero{margin-bottom:20px;}
.jb-title-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.jb-title-input{flex:1;border:1.5px solid transparent;background:transparent;font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#1a1a2e;padding:6px 10px;border-radius:8px;font-family:inherit;min-width:0;}
.jb-title-input:hover{border-color:#EEE;}
.jb-title-input:focus{border-color:var(--sb-active-fg,#29BA74);background:#fff;outline:none;}
.jb-meta{display:flex;gap:16px;align-items:center;margin-bottom:4px;padding-left:2px;flex-wrap:wrap;font-size:11px;color:#888;}
.jb-meta strong{color:#555;font-weight:700;}
.jb-meta input{font-size:11px;border:none;background:transparent;font-family:inherit;color:#555;padding:2px 4px;border-radius:4px;width:auto;}
.jb-meta input:hover{background:#F5F5F5;}
.jb-meta input:focus{outline:1px solid var(--sb-active-fg,#29BA74);background:#fff;}
.jb-toolbar{display:flex;gap:8px;align-items:center;padding:10px 0 20px;border-bottom:1px solid #EEE;margin-bottom:24px;flex-wrap:wrap;}
.jb-btn{padding:7px 14px;border:1.5px solid #E8E8E8;background:#fff;border-radius:8px;font-size:11px;font-weight:600;color:#555;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.jb-btn:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#29BA74);}
.jb-btn.pri{background:var(--sb-active-fg,#1B7A4F);color:#fff;border-color:var(--sb-active-fg,#1B7A4F);}
.jb-btn.pri:hover{filter:brightness(0.92);color:#fff;}
.jb-canvas{position:relative;padding:0 0 60px;}
.jb-mod{position:relative;background:#fff;border:1.5px solid #E8E8E8;border-radius:14px;padding:16px 18px;margin-bottom:14px;transition:border-color 0.15s,box-shadow 0.15s;}
.jb-mod:hover{border-color:#DCDCDC;box-shadow:0 4px 16px rgba(0,0,0,0.04);}
.jb-mod.expanded{border-color:var(--sb-active-fg,#29BA74);box-shadow:0 8px 28px rgba(0,0,0,0.06);}
.jb-mod-connector{position:absolute;left:32px;top:-14px;width:2px;height:14px;background:#DDD;}
.jb-mod-connector::after{content:"";position:absolute;left:-4px;bottom:-5px;width:10px;height:10px;border-radius:50%;background:#DDD;border:2px solid #fff;}
.jb-mod-head{display:flex;align-items:center;gap:10px;}
.jb-mod-num{width:28px;height:28px;border-radius:8px;background:var(--sb-active-bg,#E6F7EF);color:var(--sb-active-fg,#1B7A4F);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.jb-mod-title{flex:1;font-size:15px;font-weight:700;color:#222;border:1.5px solid transparent;background:transparent;padding:4px 8px;border-radius:6px;font-family:inherit;min-width:0;}
.jb-mod-title:hover{border-color:#EEE;background:#FAFAFA;}
.jb-mod-title:focus{border-color:var(--sb-active-fg,#29BA74);background:#fff;outline:none;}
.jb-mod-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;padding:4px 9px;border-radius:6px;cursor:pointer;flex-shrink:0;}
.jb-mod-chip.intro{background:#F0F9FF;color:#0369A1;}
.jb-mod-chip.core{background:#E6F7EF;color:#1B7A4F;}
.jb-mod-chip.scorm{background:#EDE9FE;color:#6B21A8;}
.jb-mod-chip.assess{background:#FEE2E2;color:#B91C1C;}
.jb-mod-chip.reflect{background:#FEF3C7;color:#92400E;}
.jb-mod-dur{font-size:10.5px;font-weight:600;color:#888;padding:4px 8px;background:#F7F8FA;border-radius:6px;flex-shrink:0;white-space:nowrap;}
.jb-mod-acts{display:flex;gap:2px;flex-shrink:0;}
.jb-mod-act{width:26px;height:26px;border:none;background:transparent;color:#bbb;cursor:pointer;border-radius:6px;font-size:13px;transition:all 0.12s;}
.jb-mod-act:hover{background:#F0F2F5;color:#555;}
.jb-mod-act.del:hover{color:#ef4444;background:#FEF2F2;}
.jb-mod-body{margin-top:12px;padding-top:12px;border-top:1px dashed #F0F0F0;}
.jb-mod-comps{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.jb-comp-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 9px 5px 7px;background:#F7F8FA;border:1px solid #EEE;border-radius:20px;font-size:11px;color:#444;}
.jb-comp-chip-thumb{width:24px;height:16px;border-radius:3px;overflow:hidden;border:1px solid #E8E8E8;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;}
.jb-comp-chip-thumb svg{width:24px!important;height:16px!important;}
.jb-comp-chip-x{background:none;border:none;color:#bbb;cursor:pointer;padding:0 0 0 2px;font-size:13px;line-height:1;}
.jb-comp-chip-x:hover{color:#ef4444;}
.jb-mod-addcomp{padding:6px 10px;border:1.5px dashed #DDD;background:transparent;border-radius:20px;font-size:11px;color:#888;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.jb-mod-addcomp:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#1B7A4F);background:var(--sb-active-bg,#E6F7EF);}
.jb-mod-notes{width:100%;min-height:52px;padding:8px 10px;border:1px solid #EEE;background:#FAFBFC;border-radius:8px;font-size:12px;color:#555;resize:vertical;font-family:inherit;}
.jb-mod-notes:focus{outline:none;border-color:var(--sb-active-fg,#29BA74);background:#fff;}
.jb-add{display:block;width:100%;padding:16px;border:1.5px dashed #DDD;background:#FAFBFC;border-radius:14px;font-size:13px;font-weight:600;color:#888;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:6px;}
.jb-add:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#1B7A4F);background:var(--sb-active-bg,#E6F7EF);}
.jb-empty{padding:60px 30px;text-align:center;background:#FAFBFC;border-radius:14px;border:1.5px dashed #E8E8E8;}
.jb-empty-icon{font-size:34px;opacity:0.4;margin-bottom:12px;}
/* Right: AI assistant panel */
.jb-ai{background:linear-gradient(180deg,#FAFBFC 0%,#fff 100%);border-left:1px solid #EEE;padding:22px 22px 30px;display:flex;flex-direction:column;gap:16px;min-height:100vh;}
.jb-ai-head{display:flex;align-items:center;gap:10px;}
.jb-ai-head-dot{width:10px;height:10px;border-radius:50%;background:var(--sb-active-fg,#29BA74);box-shadow:0 0 0 3px var(--sb-active-bg,#E6F7EF);}
.jb-ai-title{font-size:13px;font-weight:800;letter-spacing:-0.2px;color:#1a1a2e;}
.jb-ai-sub{font-size:11px;color:#888;line-height:1.5;}
.jb-ai-prompt{width:100%;padding:12px 14px;border:1.5px solid #E8E8E8;border-radius:10px;font-size:12.5px;background:#fff;font-family:inherit;resize:vertical;min-height:72px;}
.jb-ai-prompt:focus{outline:none;border-color:var(--sb-active-fg,#29BA74);box-shadow:0 0 0 3px var(--sb-active-bg,#E6F7EF);}
.jb-ai-send{padding:9px 14px;background:var(--sb-active-fg,#1B7A4F);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:filter 0.15s;}
.jb-ai-send:hover{filter:brightness(0.92);}
.jb-ai-chip{display:block;width:100%;padding:8px 10px;border:1px solid #E8E8E8;background:#fff;border-radius:8px;font-size:11.5px;color:#555;cursor:pointer;margin-bottom:6px;text-align:left;font-family:inherit;transition:all 0.15s;line-height:1.4;}
.jb-ai-chip:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#1B7A4F);background:var(--sb-active-bg,#E6F7EF);}
.jb-ai-section{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.3px;color:#aaa;margin-top:6px;}
.jb-ai-howto{font-size:10.5px;color:#888;line-height:1.6;padding:10px 12px;background:#F7F8FA;border-radius:8px;border:1px solid #EEE;}
.jb-ai-howto code{font-family:'SFMono-Regular',Menlo,monospace;font-size:10px;background:#fff;padding:1px 4px;border-radius:3px;border:1px solid #EEE;color:#333;}
/* --- Content Writer (Day 4) --- */
.cw-wrap{max-width:900px;margin:0 auto;padding:26px 30px 60px;color:#222;}
.cw-kicker{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:14px;}
.cw-title{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.cw-sub{font-size:13.5px;line-height:1.55;color:#666;margin-bottom:26px;max-width:640px;}
.cw-step{display:flex;align-items:center;gap:12px;margin:26px 0 14px;}
.cw-step-n{width:28px;height:28px;border-radius:50%;background:var(--sb-active-fg,#1B7A4F);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.cw-step-title{font-size:15px;font-weight:800;color:#222;letter-spacing:-0.2px;}
.cw-step-sub{font-size:12px;color:#888;font-weight:500;margin-left:6px;}
.cw-card{background:#fff;border:1.5px solid #E8E8E8;border-radius:14px;padding:18px 20px;margin-bottom:16px;}
.cw-textarea{width:100%;padding:12px 14px;border:1.5px solid #E8E8E8;border-radius:10px;font-size:13px;font-family:inherit;resize:vertical;min-height:100px;background:#fff;color:#222;}
.cw-textarea:focus{outline:none;border-color:var(--sb-active-fg,#29BA74);box-shadow:0 0 0 3px var(--sb-active-bg,#E6F7EF);}
.cw-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.cw-chip{padding:6px 10px;border:1px solid #E8E8E8;background:#FAFBFC;border-radius:20px;font-size:11px;color:#555;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.cw-chip:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#1B7A4F);background:var(--sb-active-bg,#E6F7EF);}
.cw-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.cw-btn{padding:9px 16px;border:1.5px solid #E8E8E8;background:#fff;border-radius:9px;font-size:12px;font-weight:700;color:#555;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.cw-btn:hover{border-color:var(--sb-active-fg,#29BA74);color:var(--sb-active-fg,#29BA74);}
.cw-btn.pri{background:var(--sb-active-fg,#1B7A4F);color:#fff;border-color:var(--sb-active-fg,#1B7A4F);}
.cw-btn.pri:hover{filter:brightness(0.92);color:#fff;}
.cw-form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:760px){.cw-form-row{grid-template-columns:1fr;}}
.cw-form-row label{display:flex;flex-direction:column;gap:4px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;}
.cw-form-row input,.cw-form-row select{padding:8px 10px;border:1.5px solid #E8E8E8;border-radius:8px;font-size:12.5px;font-family:inherit;background:#fff;color:#222;font-weight:500;text-transform:none;letter-spacing:normal;}
.cw-form-row input:focus,.cw-form-row select:focus{outline:none;border-color:var(--sb-active-fg,#29BA74);}
.cw-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;background:#F7F8FA;color:#666;border-radius:4px;letter-spacing:0.5px;margin-left:8px;}
.cw-preview{background:#FAFBFC;border:1px solid #EEE;border-radius:10px;padding:14px 16px;font-size:12.5px;line-height:1.7;color:#555;max-height:380px;overflow-y:auto;white-space:pre-wrap;font-family:'SFMono-Regular',Menlo,monospace;}
.cw-preview h3{font-size:13px;font-weight:800;color:#222;margin:10px 0 4px;font-family:inherit;}
.cw-how{background:#FFF9ED;border:1px solid #FDE68A;border-radius:10px;padding:12px 14px;font-size:12px;color:#92400E;line-height:1.6;}
.cw-how strong{color:#78350F;}
/* --- Pro Tip banner (Day 6 polish) --- */
.pt-banner{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);border:1px solid #334155;border-radius:14px;margin-bottom:22px;color:#E2E8F0;position:relative;overflow:hidden;box-shadow:0 4px 14px rgba(15,23,42,0.18);}
.pt-banner::before{content:"";position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(245,158,11,0.18) 0%,transparent 70%);pointer-events:none;}
.pt-banner-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#F59E0B,#EA580C);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0;font-weight:700;box-shadow:0 2px 8px rgba(245,158,11,0.4);}
.pt-banner-body{flex:1;min-width:0;position:relative;}
.pt-banner-kicker{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#FBBF24;margin-bottom:3px;}
.pt-banner-title{font-size:13.5px;font-weight:700;color:#F8FAFC;margin-bottom:3px;line-height:1.35;}
.pt-banner-text{font-size:12px;color:#CBD5E1;line-height:1.55;}
.pt-banner-text code{font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:11px;background:rgba(251,191,36,0.18);color:#FCD34D;padding:1px 6px;border-radius:4px;border:1px solid rgba(251,191,36,0.25);}
.pt-banner-cta{padding:9px 14px;background:#fff;color:#0F172A;border-radius:9px;font-size:11.5px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;align-self:center;border:none;cursor:pointer;font-family:inherit;transition:transform 0.15s,box-shadow 0.15s;position:relative;}
.pt-banner-cta:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,255,255,0.18);}
.pt-banner-dismiss{position:absolute;top:8px;right:10px;background:none;border:none;color:#64748B;font-size:14px;cursor:pointer;padding:4px;line-height:1;border-radius:6px;font-family:inherit;}
.pt-banner-dismiss:hover{color:#F8FAFC;background:rgba(255,255,255,0.06);}
/* Inline kbd hint chips */
.kbd-chip{display:inline-flex;align-items:center;gap:4px;font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:10px;font-weight:700;background:rgba(255,255,255,0.08);color:inherit;padding:2px 7px;border-radius:5px;border:1px solid rgba(255,255,255,0.18);}
.kbd-inline{display:inline-block;font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:10.5px;font-weight:700;background:#F1F5F9;color:#1E293B;padding:1px 6px;border-radius:4px;border:1px solid #CBD5E1;line-height:1.3;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>

<script>

/* ── Language / Font presets ── */
const LANG_PRESETS = {

  ar:  { n:"العربية",    dir:"rtl", font:"'Noto Sans Arabic','Cairo','Tajawal',Tahoma,sans-serif" },

/* Google Fonts auto-load for preview */
function ensureFontLoaded(font) {
  if (!font) return;
  const families = [];
  if (font.indexOf("Inter") > -1) families.push("Inter:wght@300;400;500;600;700");
  if (font.indexOf("Roboto") > -1) families.push("Roboto:wght@300;400;500;700");
  if (font.indexOf("Open Sans") > -1) families.push("Open+Sans:wght@300;400;600;700");
  if (font.indexOf("Lato") > -1) families.push("Lato:wght@300;400;700");
  if (font.indexOf("Poppins") > -1) families.push("Poppins:wght@300;400;500;600;700");
  if (font.indexOf("Montserrat") > -1) families.push("Montserrat:wght@300;400;500;600;700");
  if (font.indexOf("Noto Sans Arabic") > -1 || font.indexOf("Cairo") > -1 || font.indexOf("Tajawal") > -1) { families.push("Noto+Sans+Arabic:wght@300;400;600;700"); families.push("Cairo:wght@300;400;600;700"); }
  if (font.indexOf("Noto Sans Hebrew") > -1) families.push("Noto+Sans+Hebrew:wght@300;400;600;700");
  if (font.indexOf("Noto Sans SC") > -1) families.push("Noto+Sans+SC:wght@300;400;500;700");
  if (font.indexOf("Noto Sans JP") > -1) families.push("Noto+Sans+JP:wght@300;400;500;700");
  if (font.indexOf("Noto Sans KR") > -1) families.push("Noto+Sans+KR:wght@300;400;500;700");
  if (font.indexOf("Noto Sans Devanagari") > -1) families.push("Noto+Sans+Devanagari:wght@300;400;500;700");
  families.forEach(function(fam){
    var id = "gf-" + fam.replace(/[^a-z0-9]/gi, "-");
    if (document.getElementById(id)) return;
    var l = document.createElement("link");
    l.id = id; l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=" + fam + "&display=swap";
    document.head.appendChild(l);
  });
}

function hexToLight(hex) {
  var h = hex.replace("#","");
  if (h.length === 3) h = h.split("").map(function(c){return c+c;}).join("");
  var r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), bl = parseInt(h.substr(4,2),16);
  var mix = function(v){ return Math.round(v + (255-v)*0.88); };
  return "#" + [mix(r),mix(g),mix(bl)].map(function(v){return v.toString(16).padStart(2,"0");}).join("");
}

/* ── HTML Generator ── */
function genHTML(id, brand, data) {
  const inner = genHTMLInner(id, brand, data);
  const b = B[brand];
  const needsWrap = (b.dir === "rtl") || (b.font && b.font !== "'Inter',system-ui,sans-serif");
  if (!needsWrap) return inner;
  const dirAttr = b.dir === "rtl" ? ' dir="rtl"' : '';
  return '<div'+dirAttr+' style="font-family:'+b.font.replace(/"/g,"&quot;")+';">'+inner+'</div>';
}
function genHTMLInner(id, brand, data) {
  const b = B[brand];

      const shade = 0.95 - (0.35 * i/Math.max(n-1,1));
      const bg = 'linear-gradient(135deg, rgba(41,186,116,'+shade.toFixed(2)+'), rgba(25,122,86,'+shade.toFixed(2)+'))';
      rows += '<tr><td style="padding:3px 0;text-align:center;"><div style="display:inline-block;width:'+w+'%;padding:14px 20px;background:'+bg+';color:#fff;clip-path:polygon(0 0, 100% 0, 92% 100%, 8% 100%);"><div style="font-size:13px;font-weight:700;">'+esc(it.title)+'</div><div style="font-size:11px;opacity:0.88;margin-top:2px;">'+esc(it.desc||"")+'</div></div></td></tr>';
    });
    return '<table style="width:100%;border-collapse:collapse;">'+rows+'</table>';
  }

  if (id === "proscons" || id === "dodont") {
    const isDo = id === "dodont";
    const leftLbl = isDo ? (data.col1||"Do") : (data.col1||"Pros");
    const rightLbl = isDo ? (data.col2||"Don't") : (data.col2||"Cons");
    const leftColor = {bg:"#F0FDF4", br:"#22C55E", tx:"#15803D", ic:"✓"};
    const rightColor = {bg:"#FEF2F2", br:"#EF4444", tx:"#B91C1C", ic:"✕"};
    const lItems = items.filter(it=>it.desc!=="-");
    const rItems = items.filter(it=>it.desc==="-");
    const makeCol = (arr,c,lbl)=>{
      let rows = '<div style="padding:12px 16px;background:'+c.br+';border-radius:8px 8px 0 0;"><span style="font-size:13px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;">'+c.ic+' '+esc(lbl)+'</span></div>';
      arr.forEach(it=>{
        rows += '<div style="padding:12px 16px;border-bottom:1px solid '+b.n2+';background:'+c.bg+';">'
          +'<div style="font-size:13px;font-weight:600;color:'+c.tx+';margin-bottom:3px;">'+esc(it.title)+'</div>'
          +(it.body?'<div style="font-size:12px;color:'+b.tx+';line-height:1.6;">'+esc(it.body)+'</div>':'')
          +'</div>';
      });
      return '<td style="width:50%;vertical-align:top;padding:0 6px;"><div style="border:1.5px solid '+c.br+';border-radius:8px;overflow:hidden;">'+rows+'</div></td>';
    };
    return '<table style="width:100%;border-collapse:collapse;"><tr>'+makeCol(lItems,leftColor,leftLbl)+makeCol(rItems,rightColor,rightLbl)+'</tr></table>';
  }

  if (id === "roadmap") {
    const n = items.length || 1;
    let cells = "<tr>";
    items.forEach((it,i)=>{
      const bg = i%2===0 ? b.grad : 'linear-gradient(135deg,'+b.priDk+','+b.pri+')';
      cells += '<td style="padding:0 3px;vertical-align:top;width:'+Math.floor(100/n)+'%;">'
        +'<div style="background:'+bg+';padding:16px 14px;clip-path:polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%, 8% 50%);color:#fff;text-align:center;">'
        +'<div style="font-size:10px;font-weight:700;opacity:0.7;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">Phase '+(i+1)+'</div>'
        +'<div style="font-size:13px;font-weight:700;">'+esc(it.title)+'</div>'
        +'</div>'
        +'<div style="padding:10px 8px;font-size:11px;color:'+b.txL+';line-height:1.6;text-align:center;">'+esc(it.desc||"")+'</div>'
        +'</td>';
    });
    return '<table style="width:100%;border-collapse:collapse;">'+cells+'</tr></table>';
  }

  if (id === "kpi") {
    let cells = "<tr>";
    items.forEach(it=>{
      const trend = it.desc2 || "";
      const up = trend.indexOf("-") !== 0 && trend.indexOf("↓") < 0;
      const tColor = trend ? (up ? "#15803D" : "#B91C1C") : b.txL;
      const arrow = trend ? (up ? "▲" : "▼") : "";
      cells += '<td style="padding:6px;vertical-align:top;width:'+Math.floor(100/items.length)+'%;">'
        +'<div style="padding:20px 18px;border:1.5px solid '+b.n2+';border-radius:10px;background:#fff;border-top:3px solid '+b.pri+';">'
        +'<div style="font-size:10px;font-weight:700;color:'+b.txL+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">'+esc(it.title)+'</div>'
        +'<div style="font-size:32px;font-weight:700;color:'+b.pri+';line-height:1;margin-bottom:6px;">'+esc(it.desc||"")+'</div>'
        +(trend?'<div style="font-size:11px;font-weight:700;color:'+tColor+';">'+arrow+' '+esc(trend)+'</div>':'')
        +'</div></td>';
    });
    return '<table style="width:100%;border-collapse:collapse;">'+cells+'</tr></table>';
  }

  if (id === "donut") {
    const total = items.reduce((s,it)=>s+(parseFloat(it.desc)||0),0) || 1;
    const palette = [b.pri, b.priDk, "#15803D", "#64B088", "#A8D4B8", b.n2];
    const cx=90, cy=90, r=70, sw=28;
    const circ = 2*Math.PI*r;
    let offset = 0;
    let segs = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+b.n1+'" stroke-width="'+sw+'"/>';
    items.forEach((it,i)=>{
      const v = parseFloat(it.desc)||0;
      const len = (v/total)*circ;
      const col = palette[i%palette.length];
      segs += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-dasharray="'+len.toFixed(2)+' '+(circ-len).toFixed(2)+'" stroke-dashoffset="'+(-offset).toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
      offset += len;
    });
    const svg = '<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="width:200px;height:200px;">'+segs
      +'<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="13" font-weight="700" fill="'+b.txL+'" style="text-transform:uppercase;letter-spacing:1.5px;">'+esc(data.label||"Total")+'</text>'
      +'<text x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle" font-size="24" font-weight="700" fill="'+b.pri+'">'+esc(data.stat||total)+'</text>'
      +'</svg>';
    let legend = "";
    items.forEach((it,i)=>{
      const v = parseFloat(it.desc)||0;
      const pct = ((v/total)*100).toFixed(0);
      const col = palette[i%palette.length];
      legend += '<tr><td style="padding:6px 8px 6px 0;width:16px;"><div style="width:14px;height:14px;background:'+col+';border-radius:3px;"></div></td><td style="padding:6px 8px 6px 0;font-size:12px;font-weight:600;color:'+b.tx+';">'+esc(it.title)+'</td><td style="padding:6px 0;font-size:12px;color:'+b.txL+';text-align:right;font-variant-numeric:tabular-nums;">'+pct+'%</td></tr>';
    });
    return '<table style="width:100%;border-collapse:collapse;"><tr>'
      +'<td style="width:220px;vertical-align:middle;text-align:center;padding:16px;">'+svg+'</td>'
      +'<td style="vertical-align:middle;padding:16px;"><table style="width:100%;border-collapse:collapse;">'+legend+'</table></td>'
      +'</tr></table>';
  }

  if (id === "aiprompt") {
    const intro = esc(data.title || "👉 Copy the prompt below into your AI tool.");
    const prompt = esc(data.body || "");
    return '<div style="background:#f0f7f4;padding:20px 24px;width:100%;font-size:16px;line-height:1.6;margin-top:8px;margin-bottom:8px;border-radius:6px;">'
      + '<p style="margin:0 0 12px 0;color:'+b.tx+';">'+intro+'</p>'
      + '<div style="background:#fff;border:1px solid #cce5d8;border-left:4px solid '+b.pri+';padding:16px;line-height:1.8;color:#222;border-radius:0 6px 6px 0;">'
      + '<p style="margin:0;white-space:pre-wrap;">'+prompt+'</p>'
      + '</div></div>';
  }

  if (id === "bar") {
    const max = items.reduce((m,it)=>Math.max(m,parseFloat(it.desc)||0),0) || 1;
    let rows = "";
    items.forEach(it=>{
      const v = parseFloat(it.desc)||0;
      const pct = (v/max)*100;
      rows += '<tr><td style="width:140px;padding:8px 12px 8px 0;font-size:12px;font-weight:600;color:'+b.tx+';vertical-align:middle;text-align:right;">'+esc(it.title)+'</td>'
        +'<td style="padding:8px 0;vertical-align:middle;"><div style="position:relative;background:'+b.n1+';border-radius:4px;height:24px;overflow:hidden;">'
        +'<div style="width:'+pct.toFixed(1)+'%;height:100%;background:'+b.grad+';border-radius:4px;"></div></div></td>'
        +'<td style="width:60px;padding:8px 0 8px 12px;font-size:13px;font-weight:700;color:'+b.pri+';vertical-align:middle;font-variant-numeric:tabular-nums;">'+esc(it.desc||"0")+'</td></tr>';
    });
    return '<table style="width:100%;border-collapse:collapse;">'+rows+'</table>';
  }

  return "";
}

/* ── Inline ZIP creator (no external dependencies) ── */
function createZip(files) {
  // Minimal ZIP file creator - supports storing uncompressed files
  function str2buf(s) { var b = new Uint8Array(s.length); for (var i=0;i<s.length;i++) b[i]=s.charCodeAt(i)&0xff; return b; }
  function crc32(buf) {
    var table = new Uint32Array(256);
    for (var i=0;i<256;i++) { var c=i; for(var j=0;j<8;j++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); table[i]=c; }
    var crc = 0xFFFFFFFF;
    for (var i=0;i<buf.length;i++) crc = table[(crc^buf[i])&0xFF]^(crc>>>8);
    return (crc^0xFFFFFFFF)>>>0;
  }
  function u16(v) { return [v&0xff,(v>>8)&0xff]; }
  function u32(v) { return [v&0xff,(v>>8)&0xff,(v>>16)&0xff,(v>>24)&0xff]; }

  var localHeaders = [], centralHeaders = [], offset = 0;
  var encoder = new TextEncoder();

  files.forEach(function(f) {
    var nameBytes = encoder.encode(f.name);
    var dataBytes = encoder.encode(f.content);
    var crc = crc32(dataBytes);
    var local = new Uint8Array([].concat(
      [0x50,0x4b,0x03,0x04], u16(20), u16(0), u16(0),
      u16(0), u16(0),
      u32(crc), u32(dataBytes.length), u32(dataBytes.length),
      u16(nameBytes.length), u16(0)
    ));
    var entry = new Uint8Array(local.length + nameBytes.length + dataBytes.length);
    entry.set(local, 0);
    entry.set(nameBytes, local.length);
    entry.set(dataBytes, local.length + nameBytes.length);
    localHeaders.push(entry);

    var central = new Uint8Array([].concat(
      [0x50,0x4b,0x01,0x02], u16(20), u16(20), u16(0), u16(0),
      u16(0), u16(0),
      u32(crc), u32(dataBytes.length), u32(dataBytes.length),
      u16(nameBytes.length), u16(0), u16(0), u16(0), u16(0),
      u32(0x20), u32(offset)
    ));
    var centEntry = new Uint8Array(central.length + nameBytes.length);
    centEntry.set(central, 0);
    centEntry.set(nameBytes, central.length);
    centralHeaders.push(centEntry);
    offset += entry.length;
  });

  var centralOffset = offset;
  var centralSize = centralHeaders.reduce(function(a,b){return a+b.length;},0);
  var eocd = new Uint8Array([].concat(
    [0x50,0x4b,0x05,0x06], u16(0), u16(0),
    u16(files.length), u16(files.length),
    u32(centralSize), u32(centralOffset),
    u16(0)
  ));

  var totalSize = offset + centralSize + eocd.length;
  var result = new Uint8Array(totalSize);
  var pos = 0;
  localHeaders.forEach(function(h) { result.set(h, pos); pos += h.length; });
  centralHeaders.forEach(function(h) { result.set(h, pos); pos += h.length; });
  result.set(eocd, pos);
  return new Blob([result], {type:"application/zip"});
}

/* ── Collect BCG icons used by current data (for self-editing runtime) ── */
function collectUsedBCGIcons(data) {
  const subset = {};
  if (!window.BCG_ICONS) return subset;
  const take = (nm) => { if (nm && window.BCG_ICONS[nm] && !subset[nm]) subset[nm] = window.BCG_ICONS[nm]; };
  if (data && data.icon) take(data.icon);
  (data && data.items || []).forEach(it => take(it && it.icon));
  return subset;
}

/* ── Build Author Studio runtime (embedded in every SCORM) ── */
function buildAuthorStudioRuntime() {
  // Stringify the exact functions we need at runtime.
  // genSCORMhtml uses: esc, scTag, B, SCORM_COMPS, hasBCGIcons(), window.BCG_ICONS
  // We bake B + SCORM_COMPS as JSON, include esc/scTag/genSCORMhtml/createZip as source,
  // and at runtime map window.BCG_ICONS ← __BCG_SUBSET__.
  const src =
    '(function(){\n' +
    'var B = ' + JSON.stringify(B) + ';\n' +
    'var SCORM_COMPS = ' + JSON.stringify(SCORM_COMPS) + ';\n' +
    'window.BCG_ICONS = window.__BCG_SUBSET__ || {};\n' +
    'function hasBCGIcons(){ return !!(window.BCG_ICONS && Object.keys(window.BCG_ICONS).length>0); }\n' +
    esc.toString() + '\n' +
    scTag.toString() + '\n' +
    genSCORMhtml.toString() + '\n' +
    createZip.toString() + '\n' +
    STUDIO_CODE +
    '})();';
  return src;
}

/* ── SCORM Download (self-editing) ── */
function downloadSCORM(sel, data, brand) {
  const title = data.title || SCORM_COMPS.find(c => c.id === sel)?.n || "Activity";
  const htmlContent = genSCORMhtml(sel, data, brand);
  const bcgSubset = collectUsedBCGIcons(data);
  const runtimeSrc = buildAuthorStudioRuntime();
  const dataBlock = '<scr'+'ipt>window.__SCORM_COMP__='+JSON.stringify(sel)+';window.__SCORM_DATA__='+JSON.stringify(data)+';window.__SCORM_BRAND__='+JSON.stringify(brand)+';window.__BCG_SUBSET__='+JSON.stringify(bcgSubset)+';</scr'+'ipt>';
  const runtimeBlock = '<scr'+'ipt id="__runtime__">'+runtimeSrc+'</scr'+'ipt>';
  const fullHtml = htmlContent.replace('</body>', dataBlock + runtimeBlock + '</body>');

  const imsXml = '<?xml version="1.0" encoding="UTF-8"?><manifest identifier="BCG_SCORM" version="1.0" xmlns="http://www.imsproject.org/xsd/imscp_rootv1p1p2" xmlns:adlcp="http://www.adlnet.org/xsd/adlcp_rootv1p2"><metadata><schema>ADL SCORM</schema><schemaversion>1.2</schemaversion></metadata><organizations default="org1"><organization identifier="org1"><title>'+esc(title)+'</title><item identifier="item1" identifierref="res1"><title>'+esc(title)+'</title></item></organization></organizations><resources><resource identifier="res1" type="webcontent" adlcp:scormtype="sco" href="index.html"><file href="index.html"/></resource></resources></manifest>';

  var blob = createZip([
    { name: "index.html", content: fullHtml },
    { name: "imsmanifest.xml", content: imsXml }
  ]);
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = title.replace(/\s+/g, "_") + "_SCORM.zip";
  a.click();
  setTimeout(function(){ toast("\u2713 SCORM downloaded \u2014 once uploaded, press Ctrl+Shift+E inside the activity to edit", true); }, 200);
}

/* Library — localStorage-backed saved components */
function libGet(){ try{ return JSON.parse(localStorage.getItem("novoedLibrary")||"[]"); }catch(e){ return []; } }
function libSet(arr){ try{ localStorage.setItem("novoedLibrary", JSON.stringify(arr)); }catch(e){} }
function libSave(){
  if(!state.sel||!state.data){ toast("Open a component first",false); return; }
  var name=prompt("Name this saved component:", state.data.title || state.sel);
  if(!name) return;
  var lib=libGet();
  lib.unshift({ id:"lib_"+Date.now(), compId:state.sel, brand:state.brand, name:name, data:deepClone(state.data), savedAt:new Date().toISOString() });
  libSet(lib.slice(0,200));
  toast("Saved to Library ✓", true);
}
function libLoad(itemId){
  var it=libGet().find(function(x){return x.id===itemId;});
  if(!it) return;
  var isSC=it.compId.indexOf("s_")===0;
  state.brand=it.brand||state.brand;
  setState({ sel:it.compId, data:deepClone(it.data), output:isSC?"":genHTML(it.compId,state.brand,it.data), scormPreview:isSC?genSCORMhtml(it.compId,it.data,state.brand):"" });
  closeModal("libraryModal");
  toast("Loaded \""+it.name+"\"", true);
}
function libDelete(itemId){
  libSet(libGet().filter(function(x){return x.id!==itemId;}));

}

/* Seat-time + Readability + A11y meters */
function collectText(data){
  var parts=[];
  function walk(o){
    if(!o)return;
    if(typeof o==="string"){ parts.push(o); return; }
    if(Array.isArray(o)){ o.forEach(walk); return; }
    if(typeof o==="object"){ Object.keys(o).forEach(function(k){
      if(["img","color","icon","x","y","type","bg","outcome"].indexOf(k)<0) walk(o[k]);
    }); }
  }
  walk(data);
  return parts.join(" ");
}
function wordCount(txt){ return (txt.trim().match(/\S+/g)||[]).length; }
function syllableCount(w){
  w=w.toLowerCase().replace(/[^a-z]/g,"");
  if(w.length<=3) return 1;
  w=w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,"").replace(/^y/,"");
  var m=w.match(/[aeiouy]{1,2}/g);
  return m?m.length:1;
}
function fleschReadingEase(txt){
  var words=(txt.match(/\S+/g)||[]);
  var sentences=(txt.match(/[.!?]+/g)||[]).length||1;
  if(words.length<5) return null;
  var syllables=words.reduce(function(s,w){return s+syllableCount(w);},0);
  return 206.835 - 1.015*(words.length/sentences) - 84.6*(syllables/words.length);
}
function fleschLabel(s){
  if(s==null)return "—";
  if(s>=90)return "Very easy (Gr 5)";
  if(s>=80)return "Easy (Gr 6)";
  if(s>=70)return "Fairly easy (Gr 7)";
  if(s>=60)return "Standard (Gr 8–9)";
  if(s>=50)return "Fairly hard (Gr 10–12)";
  if(s>=30)return "Difficult (College)";
  return "Very difficult";
}
function seatTime(data, compId){
  var txt=collectText(data);
  var w=wordCount(txt);
  var isSC=String(compId).indexOf("s_")===0;
  var interactionSec=0;
  if(isSC){
    var n=(data.items||[]).length;
    var perItem={s_flipcard:6,s_accordion:4,s_tabs:6,s_reveal:6,s_stepper:10,s_promptflow:15,s_stacked:6,s_cycle:6,s_timeline_i:6,s_sort:20,s_match:15,s_quiz:15,s_poll:8,s_hotspot:8,s_scenario:20,s_categorize:25}[compId]||5;
    interactionSec=n*perItem;
  }
  var readSec = (w/200)*60;
  var totalSec = Math.max(8, Math.round(readSec + interactionSec));
  var m=Math.floor(totalSec/60), s=totalSec%60;
  return { words:w, seconds:totalSec, label: m>0?(m+"m "+s+"s"):(s+"s") };
}
/* Contrast per WCAG */
function hexToRgb(hex){var h=hex.replace("#","");if(h.length===3)h=h.split("").map(function(c){return c+c;}).join("");return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
function relLum(rgb){return rgb.map(function(v){v=v/255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}).reduce(function(a,v,i){return a+v*[0.2126,0.7152,0.0722][i];},0);}
function contrast(a,b){var l1=relLum(hexToRgb(a)),l2=relLum(hexToRgb(b));return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);}
function a11yCheck(data, brand){
  var b=B[brand];
  var issues=[], passes=[];
  var cWhite=contrast(b.pri,"#FFFFFF");
  var cText=contrast(b.tx,"#FFFFFF");
  if(cText<4.5) issues.push("Body text contrast "+cText.toFixed(1)+":1 fails WCAG AA (need ≥4.5)");
  else passes.push("Body text contrast AA ✓ ("+cText.toFixed(1)+":1)");
  if(cWhite<3) issues.push("Primary on white "+cWhite.toFixed(1)+":1 — avoid for small text");
  else passes.push("Primary contrast "+cWhite.toFixed(1)+":1 ✓");
  /* Alt text */
  var missingAlt=0;
  (data.items||[]).forEach(function(it){ if(it.img!==undefined && it.img && !it.title) missingAlt++; });
  if(missingAlt) issues.push(missingAlt+" image"+(missingAlt>1?"s":"")+" without descriptive title (alt proxy)");
  /* Color-only signal flag for pros/cons etc — we already use ✓/✕ icons so pass */
  return { issues:issues, passes:passes };
}
/* Content linter */
function contentLint(data){
  var warns=[];
  var txt=collectText(data).toLowerCase();
  if(/lorem ipsum|\btbd\b|\btodo\b|\{\{|xxxxx/.test(txt)) warns.push("Placeholder text detected (Lorem / TBD / TODO / {{...}})");
  var titleLen=(data.title||"").length;
  if(titleLen>90) warns.push("Title is "+titleLen+" chars — consider trimming to ≤80");
  var shortDescs=0;
  (data.items||[]).forEach(function(it){ if(it.desc!==undefined && typeof it.desc==="string" && it.desc.length>0 && it.desc.length<6 && it.desc!=="+" && it.desc!=="-" && it.desc!=="1" && it.desc!=="2" && it.desc!=="0") shortDescs++; });
  if(shortDescs) warns.push(shortDescs+" item description"+(shortDescs>1?"s":"")+" look truncated");
  return warns;
}
function meterPanel(){
  if(!state.sel||!state.data) return "";
  var b=B[state.brand];
  var st=seatTime(state.data, state.sel);
  var txt=collectText(state.data);
  var fre=fleschReadingEase(txt);
  var freLbl=fleschLabel(fre);
  var a11y=a11yCheck(state.data, state.brand);
  var lint=contentLint(state.data);
  var a11yColor=a11y.issues.length?"#ef4444":"#22c55e";
  var a11yLbl=a11y.issues.length?("A11y: "+a11y.issues.length+" issue"+(a11y.issues.length>1?"s":"")):"A11y: AA ✓";
  var pill=function(ic,v,sub,col){ return '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid '+b.n2+';border-radius:10px;"><span style="font-size:14px;">'+ic+'</span><div style="line-height:1.2;"><div style="font-size:11px;font-weight:700;color:'+(col||b.tx)+';">'+v+'</div><div style="font-size:9px;color:'+b.txL+';text-transform:uppercase;letter-spacing:0.5px;">'+sub+'</div></div></div>'; };
  var h='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">';
  h+=pill("⏱", st.label, st.words+" words");
  h+=pill("📖", freLbl, "readability");
  h+=pill("♿", a11yLbl, "accessibility", a11yColor);
  h+='</div>';
  if(a11y.issues.length||lint.length){
    h+='<div style="padding:10px 12px;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:10px;margin-bottom:10px;font-size:11px;color:#991B1B;line-height:1.6;">';
    a11y.issues.concat(lint).forEach(function(w){ h+='<div>⚠ '+esc(w)+'</div>'; });
    h+='</div>';
  }
  return h;
}

/* Translation JSON export/import */
function flattenStrings(obj, path){
  var out={};
  (function walk(o,p){
    if(typeof o==="string"){ out[p]=o; return; }
    if(Array.isArray(o)){ o.forEach(function(v,i){ walk(v,p+"["+i+"]"); }); return; }
    if(o&&typeof o==="object"){ Object.keys(o).forEach(function(k){
      if(["img","color","icon","x","y","type","bg","outcome"].indexOf(k)<0) walk(o[k], p?p+"."+k:k);
    }); }
  })(obj,path||"");
  return out;
}
function unflattenInto(target, flat){
  Object.keys(flat).forEach(function(k){
    var parts=k.match(/([^.\[\]]+|\[\d+\])/g)||[];
    var cur=target;
    parts.forEach(function(p,i){
      var key=p.startsWith("[")?parseInt(p.slice(1,-1),10):p;
      if(i===parts.length-1){ cur[key]=flat[k]; }
      else{ if(cur[key]==null) cur[key]={}; cur=cur[key]; }
    });
  });
}
function exportTranslation(){
  if(!state.data){ toast("Open a component first",false); return; }
  var flat=flattenStrings(state.data);
  var blob=JSON.stringify(flat, null, 2);
  navigator.clipboard.writeText(blob).then(function(){
    toast("Translation JSON copied — send to translator",true);
  });
}
function importTranslation(){
  var txt=prompt("Paste the translated JSON (flat key→string map):");
  if(!txt)return;
  try{
    var flat=JSON.parse(txt.trim());
    unflattenInto(state.data, flat);
    doRegen();
    toast("Translation applied ✓",true);
  }catch(e){ toast("Parse failed: "+e.message,false); }
}

var paletteState={open:false,q:"",active:0,results:[]};

/* Fuzzy score: 0 = no match, higher = better */
function palFuzzyScore(hay, needle){
  if(!needle) return 1;
  var h=hay.toLowerCase(), n=needle.toLowerCase();
  if(h===n) return 1000;
  if(h.indexOf(n)===0) return 600 - h.length;          // prefix
  var idx=h.indexOf(n);
  if(idx>=0) return 400 - idx - h.length*0.1;          // substring
  /* Subsequence match (typed letters appear in order) */
  var hi=0, score=0, streak=0, matched=0;
  for(var i=0;i<n.length;i++){
    var ch=n.charAt(i), found=false;
    while(hi<h.length){
      if(h.charAt(hi)===ch){ matched++; streak++; score+=10+streak*2; hi++; found=true; break; }
      hi++; streak=0;
    }
    if(!found) return 0;
  }
  return matched===n.length ? score : 0;
}

function palHighlight(text, needle){
  if(!needle) return esc(text);
  var h=text.toLowerCase(), n=needle.toLowerCase();
  var i=h.indexOf(n);
  if(i>=0){
    return esc(text.slice(0,i))+'<span class="pal-hit">'+esc(text.slice(i,i+n.length))+'</span>'+esc(text.slice(i+n.length));
  }
  /* Subsequence highlight */
  var out="", hi=0, ni=0;
  while(hi<text.length){
    if(ni<n.length && h.charAt(hi)===n.charAt(ni)){
      out+='<span class="pal-hit">'+esc(text.charAt(hi))+'</span>'; ni++;
    } else {
      out+=esc(text.charAt(hi));
    }
    hi++;
  }
  return out;
}

function palComputeResults(q){
  var q2=(q||"").trim();
  var all=[];
  HTML_COMPS.forEach(function(c){all.push({id:c.id,n:c.n,d:c.d,cat:c.cat,type:"html"});});
  SCORM_COMPS.forEach(function(c){all.push({id:c.id,n:c.n,d:c.d,cat:c.cat,type:"scorm"});});
  if(!q2){
    /* Default: show a curated top-10 mix */
    var top=["highlight","callout","stat-row","timeline","cards","swot","2x2","pyramid","funnel","quiz","s_flip","s_accordion","s_drag_sort","s_branching"];
    return top.map(function(id){return all.find(function(c){return c.id===id;});}).filter(Boolean);
  }
  var scored=all.map(function(c){
    var sn=palFuzzyScore(c.n, q2);
    var sd=palFuzzyScore(c.d, q2)*0.5;
    var sc=palFuzzyScore(c.cat, q2)*0.3;
    return {c:c, s:Math.max(sn,sd,sc)};
  }).filter(function(x){return x.s>0;});
  scored.sort(function(a,b){return b.s-a.s;});
  return scored.slice(0,12).map(function(x){return x.c;});
}
