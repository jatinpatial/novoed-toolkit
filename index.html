/* Global Ctrl+K / Cmd+K */
(function(){
  if(window._palKeyBound) return;
  window._palKeyBound=true;
  document.addEventListener("keydown",function(ev){
    var isModK=(ev.key==="k"||ev.key==="K")&&(ev.metaKey||ev.ctrlKey);
    if(isModK){ ev.preventDefault(); paletteState.open?closePalette():openPalette(); }
    else if(ev.key==="Escape"&&paletteState.open){ closePalette(); }
  });
})();

/* Phase 2 Day 3F: platform-aware keyboard shortcut labels.
   ⌘K is the Mac convention; Ctrl K is Windows/Linux. Displaying the wrong
   one (e.g. ⌘K to a Windows user) makes the shortcut feel like it's "for
   somebody else." We flip the label based on navigator.platform so every
   surface (welcome modal, help drawer, sidebar Search button, footer,
   search-bar chip) shows the user the keys they actually need to press.
   The keydown handler above already accepts BOTH metaKey and ctrlKey, so
   the underlying behavior is identical on both platforms. */

const KBD_MOD_K_TIGHT = IS_MAC ? "⌘K"        : "Ctrl+K";        /* for inline tooltips and tight chips */

function writerParseOutline(){
  var w=state.writer; if(!w||!w.outline.trim()){ studioToast("Paste Claude's response first"); return; }
  var txt=w.outline.trim();
  /* Try JSON first */
  var clean=txt.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();
  var first=clean.indexOf("{"), last=clean.lastIndexOf("}");
  if(first>=0&&last>first) clean=clean.slice(first,last+1);
  try {
    var data=JSON.parse(clean);
    if(data.modules && Array.isArray(data.modules)){
      state.journey={
        id:"j_"+Date.now(),
        title:data.title||w.topic||"Untitled Journey",
        audience:data.audience||w.audience||"",
        totalDuration:0,
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString(),
        modules:data.modules.map(function(m,i){
          return {
            id:"m_"+Date.now()+"_"+i,
            title:m.title||("Module "+(i+1)),
            type:m.type||"core",
            duration:parseInt(m.duration)||5,
            components:Array.isArray(m.components)?m.components:[],
            notes:m.notes||""
          };
        })
      };
      state.mode="journey"; state.sel=null; state.journeyExpanded=null;
      try{ localStorage.setItem("studioJourneyCurrent", JSON.stringify(state.journey)); }catch(e){}
      render();
      studioToast("✓ Parsed "+data.modules.length+" modules → opening Journey Builder");
      return;
    }
  } catch(e){ /* not JSON, try markdown */ }
  /* Markdown fallback: split by ## headings */
  var sections=txt.split(/^##\s+/m).slice(1);
  if(sections.length<2){ studioToast("Couldn't detect JSON or markdown modules"); return; }
  state.journey={
    id:"j_"+Date.now(),
    title:w.topic||"Untitled Journey",
    audience:w.audience||"",
    totalDuration:0,
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    modules:sections.map(function(sec,i){
      var lines=sec.split(/\r?\n/);
      var title=(lines[0]||"").replace(/^\d+\.\s*/,"").trim()||"Module "+(i+1);
      var rest=lines.slice(1).join("\n").trim();
      var typeHint=title.toLowerCase();
      var type="core";
      if(i===0||typeHint.indexOf("intro")>=0||typeHint.indexOf("welcome")>=0) type="intro";
      else if(i===sections.length-1||typeHint.indexOf("reflect")>=0||typeHint.indexOf("wrap")>=0) type="reflect";
      else if(typeHint.indexOf("quiz")>=0||typeHint.indexOf("assess")>=0||typeHint.indexOf("check")>=0) type="assess";
      else if(typeHint.indexOf("activity")>=0||typeHint.indexOf("practice")>=0) type="scorm";
      return {
        id:"m_"+Date.now()+"_"+i,
        title:title,
        type:type,
        duration:5,
        components:[],
        notes:rest
      };
    })
  };
  state.mode="journey"; state.sel=null; state.journeyExpanded=null;
  try{ localStorage.setItem("studioJourneyCurrent", JSON.stringify(state.journey)); }catch(e){}
  render();
  studioToast("✓ Parsed "+sections.length+" markdown sections → Journey Builder");
}

/* Phase 2: route-fade trigger. Replays the routeFadeIn animation on .app-main

   without blowing away in-view interactions like typing in a field. */

  var el=document.querySelector(".app-main");
  if(!el) return;

  void el.offsetWidth;
  el.classList.add("route-fade-in");
}

/* ── MCP bridge ──────────────────────────────────────────────────────────
   When served from the local MCP server (localhost/127.0.0.1), connect to
   ws://<host>/ws and listen for pushes from Claude Desktop. Silently no-ops
   when the server isn't running or when the page is hosted elsewhere. */
(function connectMCP(){
  try {
    var h = location.hostname;
    if (h !== "localhost" && h !== "127.0.0.1") return;
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    var url = proto + "//" + location.host + "/ws";
    var ws = new WebSocket(url);
    var dot = null;
    function showDot(connected){
      if (!dot) {
        dot = document.createElement("div");
        dot.id = "__mcp_dot__";
        dot.title = "MCP bridge — Claude Desktop can push components here";
        dot.style.cssText = "position:fixed;bottom:10px;right:10px;z-index:9999;font-size:11px;padding:5px 10px;border-radius:20px;font-weight:700;font-family:system-ui,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.12);pointer-events:none;transition:opacity 0.3s;";
        document.body.appendChild(dot);
      }
      if (connected) { dot.style.background = "#D1FAE5"; dot.style.color = "#065F46"; dot.textContent = "● MCP connected"; }
      else           { dot.style.background = "#FEE2E2"; dot.style.color = "#991B1B"; dot.textContent = "● MCP offline"; }
    }
    ws.addEventListener("open", function(){ showDot(true); });
    ws.addEventListener("close", function(){ showDot(false); });
    ws.addEventListener("error", function(){ /* swallow — toolkit still works standalone */ });
    ws.addEventListener("message", function(ev){
      var msg; try { msg = JSON.parse(ev.data); } catch(e){ return; }
      if (!msg) return;

      /* Open component (existing flow) */
      if (msg.type === "open") {
        var comp = msg.comp, data = msg.data || {}, brand = msg.brand || state.brand || "bcg";
        if (!comp) return;
        var isSC = comp.indexOf("s_") === 0;
        var merged = Object.assign({}, DEFAULTS[comp] || {}, data);
        setState({
          mode: isSC ? "scorm" : "html",
          sel: comp,
          data: merged,
          brand: brand,
          output: isSC ? "" : genHTML(comp, brand, merged),
          scormPreview: isSC ? genSCORMhtml(comp, merged, brand) : "",
          cat: "all",
          search: ""
        });
        if (typeof toast === "function") toast("← Received '" + comp + "' from Claude", true);
        return;
      }

      /* Journey push — Claude Desktop sent a full journey structure */
      if (msg.type === "journey_push" && msg.journey) {
        var incoming = msg.journey;
        var mode = msg.mode === "append" ? "append" : "replace";
        if (!state.journey || mode === "replace") {
          state.journey = {
            id: "j_" + Date.now(),
            title: incoming.title || "Untitled Journey",
            audience: incoming.audience || "",
            totalDuration: 0,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            modules: []
          };
        } else {
          // append: keep existing title/audience
        }
        (incoming.modules || []).forEach(function(m, i){
          state.journey.modules.push({
            id: "m_" + Date.now() + "_" + i + "_" + Math.floor(Math.random()*1000),
            title: m.title || ("Module " + (i + 1)),
            type: m.type || "core",
            duration: parseInt(m.duration) || 5,
            components: Array.isArray(m.components) ? m.components : [],
            notes: m.notes || ""
          });
        });
        state.mode = "journey"; state.sel = null; state.journeyExpanded = null;
        try { localStorage.setItem("studioJourneyCurrent", JSON.stringify(state.journey)); } catch(e){}
        render();
        if (typeof studioToast === "function") studioToast("← Journey '" + incoming.title + "' pushed from Claude (" + (incoming.modules||[]).length + " modules)");
        return;
      }
    });
  } catch(e) { /* WebSocket unavailable, give up silently */ }
})();
